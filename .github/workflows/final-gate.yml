name: Final Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: final-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  final-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required gate signals
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number, per_page: 100
            });
            const humanApproval = reviews.some(r => r.state === 'APPROVED' && r.user?.type !== 'Bot');
            if (!humanApproval) {
              core.setFailed('Human approval is required before merge.');
            } else {
              core.notice('Human approval detected.');
            }

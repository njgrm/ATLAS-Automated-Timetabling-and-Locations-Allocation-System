name: Codex Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: >
      github.event.pull_request.draft == false &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'codex-review[bot]' &&
      github.actor != 'gemini-ui-polish[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changes
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$base" "$head" > changed_files.txt
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          cat changed_files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run Codex review placeholder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is not configured."
            exit 1
          fi
          echo "Codex review integration point."
          echo "Use pipeline-contract schema for findings."
          echo "Changed files passed to reviewer:"
          cat changed_files.txt

      - name: Publish PR audit summary
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const body = [
              "### Codex Review Gate",
              "",
              "- Status: ✅ Completed",
              "- Contract: `.github/agent-contracts/pipeline-contract.yml`",
              "- Schema: finding_id, severity, rule, file, line, summary, required_fix",
              "",
              "_This workflow is ready for API wiring with your Codex reviewer._"
            ].join("\n");
            await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
